<script>

    document.addEventListener("DOMContentLoaded", function () {

        var toggleBtn = document.getElementById("menu-toggle");
        var menu = document.getElementById("menu");
        var icon = document.getElementById("icon");

        if (!toggleBtn || !menu || !icon) return;

        // Open / close menu
        toggleBtn.addEventListener("click", function (e) {
            e.stopPropagation();

            menu.classList.toggle("active");
            icon.innerHTML = menu.classList.contains("active") ? "✖" : "☰";
        });

        // Close menu when clicking outside
        document.addEventListener("click", function (e) {
            if (menu.classList.contains("active") &&
                !menu.contains(e.target) &&
                !toggleBtn.contains(e.target)) {

                menu.classList.remove("active");
                icon.innerHTML = "☰";
            }
        });

        // Mobile Dropdown — stop click bubbling so outside-click doesn't fire
        document.querySelectorAll(".dropdown .toggle-btn").forEach(function (btn) {
            btn.addEventListener("click", function (e) {
                if (window.innerWidth <= 1024) {
                    e.preventDefault();
                    e.stopPropagation();

                    // Close other open dropdowns
                    document.querySelectorAll(".dropdown.active").forEach(function (openItem) {
                        if (openItem !== btn.parentElement) {
                            openItem.classList.remove("active");
                        }
                    });

                    btn.parentElement.classList.toggle("active");
                }
            });
        });

    });

</script>
